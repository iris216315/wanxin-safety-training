# 万鑫安全培训报名系统 - Render 部署配置文件
# 详见 https://render.com/docs/blueprint-spec

services:
  - type: web
    name: wanxin-safety-training-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: ALLOWED_ORIGINS
        value: https://iris216315.github.io
      - key: ADMIN_PASSWORD
        generateValue: true
